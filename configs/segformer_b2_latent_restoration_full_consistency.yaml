experiment:
  name: segformer_b2_latent_restoration_full_consistency
  output_dir: outputs/segformer_b2_latent_restoration_full_consistency
  seed: 13

data:
  format: nyuv2_mat
  mat_path: nyu_depth_v2_labeled.mat
  splits_path: data/nyuv2_meta/splits.mat
  class_mapping_path: data/nyuv2_meta/classMapping40.mat
  label_mode: nyu40
  image_size: [240, 320]
  num_classes: 40
  ignore_index: 255
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]

model:
  name: segformer_latent_restoration
  backbone_name: nvidia/mit-b2
  pretrained: true
  latent_channels: 256
  dropout: 0.05
  gradient_checkpointing: true
  depth_mean: [0.5, 0.5, 0.5]
  depth_std: [0.5, 0.5, 0.5]

training:
  epochs: 100
  batch_size: 2
  num_workers: 4
  learning_rate: 0.00006
  weight_decay: 0.01
  amp: true
  init_from_checkpoint: outputs/segformer_b2_fusion_rgbd/best.pt
  teacher:
    config: configs/segformer_b2_fusion_rgbd.yaml
    checkpoint: outputs/segformer_b2_fusion_rgbd/best.pt
  num_student_views: 2
  student_conditions:
    - rgb_only
    - depth_only
    - rgb_corrupt
    - depth_corrupt
  student_condition_weights: [0.30, 0.30, 0.20, 0.20]
  validation_conditions:
    - clean_rgbd
    - rgb_only
    - depth_only
    - rgb_corrupt
    - depth_corrupt
  robust_validation_conditions:
    - rgb_only
    - depth_only
    - rgb_corrupt
    - depth_corrupt
  checkpoint_metric: avg_robust_miou
  losses:
    seg_loss_weight: 1.0
    restoration_loss_weight: 0.25
    student_ce_loss_weight: 1.0
    latent_consistency_weight: 0.05
    prediction_consistency_weight: 0.025
    consistency_temperature: 2.0
    restoration_distance: smooth_l1
    teacher_loss_anneal:
      enabled: true
      apply_to:
        - latent_consistency_weight
        - prediction_consistency_weight
      start_fraction: 0.20
      end_fraction: 0.80
      final_scale: 0.10
  scheduler:
    type: cosine
    min_lr: 0.000001

evaluation:
  batch_size: 4
  num_workers: 4
  conditions:
    - clean_rgbd
    - rgb_only
    - depth_only
    - rgb_corrupt
    - depth_corrupt
  severity: 2
  rgb_corruption: mixed
  depth_corruption: mixed
