experiment:
  name: early_fusion_rgbd
  output_dir: outputs/early_fusion_rgbd
  seed: 13

data:
  format: nyuv2_mat
  mat_path: nyu_depth_v2_labeled.mat
  splits_path: data/nyuv2_meta/splits.mat
  class_mapping_path: data/nyuv2_meta/classMapping40.mat
  label_mode: nyu40
  image_size: [240, 320]
  num_classes: 40
  ignore_index: 255
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]

model:
  name: simple_unet
  modality: rgbd
  base_channels: 32

training:
  epochs: 20
  batch_size: 8
  num_workers: 4
  learning_rate: 0.0003
  weight_decay: 0.0001
  amp: true

evaluation:
  batch_size: 8
  num_workers: 4
  conditions:
    - clean_rgbd
    - rgb_only
    - depth_only
    - rgb_corrupt
    - depth_corrupt
    - both_corrupt
  severity: 2
  rgb_corruption: mixed
  depth_corruption: mixed
